<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Linefire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --color-background: #080A14; /* Deep dark navy */
        --color-stroke-primary: #E2E8F0; /* Near-white */
        --color-stroke-primary-rgb: 226, 232, 240;
        --color-stroke-secondary: #94A3B8; /* Muted slate */
        --color-stroke-secondary-rgb: 148, 163, 184;
        --color-accent-subtle: #1E2A40; /* Dark for inactive elements */
        --color-accent-subtle-rgb: 30, 42, 64;
        --color-accent-health: #00FF88;
        --color-accent-health-rgb: 0, 255, 136;
        --color-accent-warning: #FF9500;
        --color-accent-warning-rgb: 255, 149, 0;
        --color-accent-critical: #FF2055; /* Neon red-pink for critical states */
        --color-accent-critical-rgb: 255, 32, 85;
        --color-accent-shield: #00AAFF;
        --color-accent-shield-rgb: 0, 170, 255;
        --stroke-width-standard: 1.5px;
        --stroke-width-thick: 2.5px;
      }

      /* ── Screen transition animation ─────────────────────────────────────── */
      @keyframes lf-screen-in {
        from { opacity: 0; transform: translateY(6px) scale(0.995); }
        to   { opacity: 1; transform: translateY(0)   scale(1); }
      }
      .lf-screen-enter {
        animation: lf-screen-in 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      html, body {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: var(--color-background); /* Dark outer background */
        font-family: 'Inter', sans-serif; /* Global font */
        font-weight: 300; /* Default light weight */
        color: var(--color-stroke-primary);
      }
      #root {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .game-cursor {
        /* cursor: none;  Consider hiding system cursor if custom one is made */
      }
      .noselect {
        -webkit-touch-callout: none; -webkit-user-select: none; -khtml-user-select: none;
        -moz-user-select: none; -ms-user-select: none; user-select: none;
      }

      .game-area-background {
        background-color: #080A14; /* Dark background for the game area */
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; stroke-width: var(--stroke-width-standard); }
        50% { opacity: 0.6; stroke-width: var(--stroke-width-thick); }
      }
      .collectible-pulse svg {
        animation: pulse 1.5s infinite ease-in-out;
      }

      /* Combo counter pop-in animation */
      @keyframes combo-pop {
        0%   { transform: scale(0.35); opacity: 0; }
        55%  { transform: scale(1.22); opacity: 1; }
        100% { transform: scale(1.00); opacity: 1; }
      }

      /* Low-HP vignette overlay */
      .hp-vignette {
        background: radial-gradient(
          ellipse at center,
          transparent 30%,
          rgba(255, 32, 85, 0.12) 65%,
          rgba(255, 32, 85, 0.42) 100%
        );
        animation: hp-vignette-pulse 0.9s ease-in-out infinite;
      }
      @keyframes hp-vignette-pulse {
        0%, 100% { opacity: 0.6; }
        50%       { opacity: 1.0; }
      }

      /* ── Neon Button System ──────────────────────────────────────── */
      .btn-minimal {
        font-family: 'Inter', sans-serif;
        background-color: transparent;
        border: 1px solid rgba(226, 232, 240, 0.35);
        color: var(--color-stroke-primary);
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 300;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transition: all 0.18s ease-in-out;
        position: relative;
        overflow: hidden;
      }
      .btn-minimal::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(135deg, rgba(0,255,204,0.0) 0%, rgba(0,255,204,0.06) 100%);
        opacity: 0;
        transition: opacity 0.18s ease-in-out;
      }
      .btn-minimal:hover:not(:disabled)::before { opacity: 1; }
      .btn-minimal:hover:not(:disabled) {
        border-color: rgba(0,255,204,0.7);
        color: #00FFCC;
        text-shadow: 0 0 12px rgba(0,255,204,0.6);
        box-shadow: 0 0 14px rgba(0,255,204,0.18), inset 0 0 8px rgba(0,255,204,0.06);
      }
      .btn-minimal:active:not(:disabled) { transform: scale(0.97); }
      .btn-minimal:disabled {
        border-color: var(--color-accent-subtle);
        color: var(--color-accent-subtle);
        cursor: not-allowed;
      }

      .btn-primary-minimal {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, rgba(0,255,204,0.15) 0%, rgba(0,255,136,0.08) 100%);
        border: 1px solid rgba(0,255,204,0.6);
        color: #00FFCC;
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 300;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0,255,204,0.5);
        box-shadow: 0 0 16px rgba(0,255,204,0.2), inset 0 0 10px rgba(0,255,204,0.05);
        transition: all 0.18s ease-in-out;
        position: relative; overflow: hidden;
      }
      .btn-primary-minimal:hover:not(:disabled) {
        background: linear-gradient(135deg, rgba(0,255,204,0.28) 0%, rgba(0,255,136,0.18) 100%);
        border-color: rgba(0,255,204,0.9);
        box-shadow: 0 0 28px rgba(0,255,204,0.35), inset 0 0 14px rgba(0,255,204,0.1);
        text-shadow: 0 0 16px rgba(0,255,204,0.8);
      }
      .btn-primary-minimal:active:not(:disabled) { transform: scale(0.97); }
      .btn-primary-minimal:disabled {
        border-color: var(--color-accent-subtle);
        color: var(--color-accent-subtle);
        background-color: transparent;
        cursor: not-allowed;
        text-shadow: none; box-shadow: none;
      }

      /* ── Glassmorphism panel ────────────────────────────────────── */
      .glass-panel {
        background: rgba(8, 10, 20, 0.82);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(0,255,204,0.18);
        border-radius: 8px;
        box-shadow: 0 0 40px rgba(0,255,204,0.06), 0 8px 32px rgba(0,0,0,0.7);
      }

      /* ── Title neon flicker ──────────────────────────────────── */
      @keyframes neon-flicker {
        0%, 94%, 96%, 98%, 100% { opacity: 1; text-shadow: 0 0 40px rgba(0,255,204,0.4), 0 0 80px rgba(0,255,204,0.16); }
        95%, 97%, 99% { opacity: 0.88; text-shadow: 0 0 20px rgba(0,255,204,0.2); }
      }
      .neon-title { animation: neon-flicker 8s ease-in-out infinite; }

      /* ── HP bar glow ──────────────────────────────────────────── */
      .hp-bar-fill {
        transition: width 0.25s ease-out, background-color 0.1s linear;
        position: relative;
      }
      .hp-bar-fill::after {
        content: '';
        position: absolute; top: 0; right: 0;
        width: 4px; height: 100%;
        background: rgba(255,255,255,0.8);
        border-radius: 0 2px 2px 0;
        filter: blur(2px);
      }

      /* Tutorial Specific Button Styles */
      .btn-tutorial-secondary {
        font-family: 'Inter', sans-serif;
        background-color: transparent;
        border: 1px solid rgba(148,163,184,0.35);
        color: var(--color-stroke-secondary);
        padding: 8px 16px;
        border-radius: 4px;
        font-weight: 300;
        letter-spacing: 0.1em;
        transition: all 0.18s ease-in-out;
      }
      .btn-tutorial-secondary:hover:not(:disabled) {
        border-color: rgba(148,163,184,0.7);
        color: var(--color-stroke-primary);
        box-shadow: 0 0 10px rgba(148,163,184,0.15);
      }
      .btn-tutorial-secondary:active:not(:disabled) { transform: scale(0.97); }
      .btn-tutorial-secondary:disabled {
        border-color: var(--color-accent-subtle);
        color: var(--color-accent-subtle);
        cursor: not-allowed;
      }
      
      .kbd-minimal {
        font-family: 'Inter', sans-serif;
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        border: var(--stroke-width-standard) solid var(--color-stroke-secondary);
        background-color: var(--color-background);
        color: var(--color-stroke-primary);
        font-weight: 500; /* KBD slightly heavier for emphasis */
        margin: 0 2px;
        box-shadow: 1px 1px 0px var(--color-stroke-secondary);
      }

      /* Joystick Styles (Minimalist) */
      .joystick-base {
        position: fixed;
        border-radius: 50%;
        background-color: transparent;
        border: var(--stroke-width-thick) solid rgba(var(--color-stroke-secondary-rgb), 0.8); /* Darker gray border, more opaque */
        opacity: 0.8; 
        /* display: flex; justify-content: center; align-items: center; */ /* Not needed for absolute child */
        z-index: 1000;
        -webkit-tap-highlight-color: transparent;
      }
      .joystick-knob {
        border-radius: 50%;
        background-color: rgba(var(--color-stroke-secondary-rgb), 0.9); /* Darker gray knob, more opaque */
        opacity: 0.9; 
        position: absolute;
        top: 50%; /* For centering with transform */
        left: 50%; /* For centering with transform */
        pointer-events: none;
        -webkit-tap-highlight-color: transparent;
      }

      /* HUD Highlighting */
      @keyframes pulse-highlight {
        0%, 100% { box-shadow: 0 0 0 0 rgba(var(--color-accent-warning-rgb), 0.5); } 
        50% { box-shadow: 0 0 0 8px rgba(var(--color-accent-warning-rgb), 0); }
      }
      .hud-highlight {
        animation: pulse-highlight 1.5s infinite;
        border-radius: 4px; 
        padding: 2px; 
        margin: -2px; 
        background-color: rgba(var(--color-accent-warning-rgb), 0.1); 
      }

      /* Mobile Action Buttons - General */
      .btn-action-mobile {
        position: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px; 
        height: 56px; 
        border-radius: 50%;
        background-color: rgba(var(--color-stroke-primary-rgb), 0.6); 
        border: 1.5px solid var(--color-background); 
        color: var(--color-background); 
        box-shadow: 0 2px 5px rgba(0,0,0,0.25);
        transition: all 0.15s ease-in-out;
        z-index: 200; 
        -webkit-tap-highlight-color: transparent;
      }
      .btn-action-mobile:hover:not(:disabled) {
        background-color: rgba(var(--color-stroke-primary-rgb), 0.8);
      }
      .btn-action-mobile:active:not(:disabled) {
        transform: scale(0.95);
        background-color: rgba(var(--color-stroke-primary-rgb), 1);
      }
      .btn-action-mobile:disabled { /* General disabled state for icon buttons */
        background-color: rgba(var(--color-accent-subtle-rgb), 0.4);
        border-color: rgba(var(--color-accent-subtle-rgb), 0.6);
        color: var(--color-stroke-secondary);
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-action-mobile.ready { /* General ready state (e.g. for shield if it had one) */
        border-color: var(--color-accent-health);
        box-shadow: 0 0 8px var(--color-accent-health);
      }
       .btn-action-mobile.active { /* General active state for icon buttons (like shield active, but not airstrike active) */
        border-color: var(--color-accent-warning);
        background-color: rgba(var(--color-accent-warning-rgb), 0.7);
        color: var(--color-stroke-primary);
      }
      .btn-action-mobile svg { /* Styles for icons within buttons */
        width: 55%; 
        height: 55%; 
      }

      /* Airstrike Button Specific Styles (Icon-less, 56px) */
      .btn-action-mobile.airstrike-button {
        background-color: var(--color-accent-critical); /* Red when available (not disabled, not active) */
        border-color: var(--color-background);
      }
      .btn-action-mobile.airstrike-button.active { /* Airstrike firing */
        background-color: var(--color-accent-critical); /* Solid Red */
        border-color: var(--color-background); 
      }
      .btn-action-mobile.airstrike-button:disabled { /* Airstrike charging/unavailable */
        background-color: var(--color-accent-subtle); /* Solid Light Gray */
        border-color: var(--color-stroke-secondary); 
        opacity: 0.9;
      }

      /* Shield Button Specific Styles (48px) - Now Black Background */
      .btn-action-mobile.shield-button-mobile {
        width: 48px;
        height: 48px;
        background-color: rgba(var(--color-stroke-primary-rgb), 0.6); /* Black background */
        border-color: var(--color-background); /* Light border for contrast */
        color: var(--color-background); /* Light icon color */
      }
      .btn-action-mobile.shield-button-mobile:hover:not(:disabled) {
        background-color: rgba(var(--color-stroke-primary-rgb), 0.8);
      }
      .btn-action-mobile.shield-button-mobile:active:not(:disabled) {
        background-color: rgba(var(--color-stroke-primary-rgb), 1);
        transform: scale(0.95);
      }
      .btn-action-mobile.shield-button-mobile:disabled {
        background-color: rgba(var(--color-stroke-primary-rgb), 0.3); /* Dimmer black/gray */
        border-color: rgba(var(--color-stroke-primary-rgb), 0.5);
        color: rgba(var(--color-background), 0.5); /* Dimmer icon */
        opacity: 0.7;
      }
       .btn-action-mobile.shield-button-mobile.ready { /* If shield needed a specific ready visual (green border) */
        border-color: var(--color-accent-health); 
        box-shadow: 0 0 8px var(--color-accent-health);
      }
      .btn-action-mobile.shield-button-mobile svg {
        width: 50%; 
        height: 50%; 
      }


      .hud-icon-button {
        background-color: transparent;
        border: none;
        color: var(--color-stroke-primary);
        padding: 4px;
        border-radius: 4px;
        transition: background-color 0.15s ease-in-out;
        pointer-events: auto; /* Ensure clickable */
      }
      .hud-icon-button:hover {
        background-color: rgba(var(--color-stroke-primary-rgb), 0.1);
      }
      .hud-icon-button:active {
        background-color: rgba(var(--color-stroke-primary-rgb), 0.2);
      }
      .hud-icon-button svg {
        width: 20px; /* sm:w-5 */
        height: 20px; /* sm:h-5 */
      }
       @media (min-width: 640px) { /* sm breakpoint */
        .hud-icon-button svg {
          width: 24px; /* sm:w-6 */
          height: 24px; /* sm:h-6 */
        }
      }
    </style>
